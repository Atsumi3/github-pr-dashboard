services:
  backend:
    build: ./backend
    expose:
      - '3001'
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - HOST_AI_URL=http://host.docker.internal:3002
      - AI_SHARED_SECRET=${AI_SHARED_SECRET}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - '127.0.0.1:3000:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
