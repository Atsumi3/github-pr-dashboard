# Shared security headers — included by every location that uses add_header,
# because nginx replaces (does not merge) add_header lists at the lowest
# applicable level. Update this file in one place; all locations stay in sync.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# script-src: 'self' for our own bundle + jsdelivr for highlight.js
# language modules that are lazy-loaded on demand (Dart, Dockerfile, Elixir,
# Zig, Terraform, ...; the bundled highlight.min.js already covers ~36
# common languages). jsdelivr serves npm packages at content-addressable
# URLs and is widely trusted, but we still pin to a specific version in
# the request URL.
# style-src keeps 'unsafe-inline' because the dashboard sets dynamic styles
# at runtime — label background colors derived from GitHub's per-label hex
# values, severity-tinted error colors in describeRepoError(), label-aware
# foreground via pickLabelTextColor() — that cannot be hashed at build time.
# Removing 'unsafe-inline' would require either CSP nonce injection
# (requires a nonce per response, hard with the static nginx setup) or a
# full migration of dynamic colors to CSS custom properties via setProperty
# on the parent element.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://avatars.githubusercontent.com data:; connect-src 'self'; frame-ancestors 'none'" always;
