server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # Server-level defaults; locations that override add_header MUST also
    # include security-headers.conf to keep these set.
    include /etc/nginx/conf.d/security-headers.conf;

    location = /js/sw.js {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Service-Worker-Allowed "/" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Static assets must not fall back to index.html — return real 404s instead
    # so missing scripts/styles surface as errors rather than HTML masquerading as JS.
    # JS/CSS get no-cache because filenames are not hashed; without this a
    # browser HTTP cache could serve a stale app.js after we bump SW
    # CACHE_VERSION, leaving the user with mismatched code paths.
    # Images and fonts are content-stable, so a 1-day cache is fine.
    location ~* \.(js|css)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        # index.html drives the SPA bootstrap; if it gets cached, users miss
        # backend changes that ship along with new HTML/script tags.
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow enough time for the backend's gqlWithRetry to exhaust 3
        # attempts (each capped at 15s by AbortSignal) plus backoff. Without
        # this nginx 504s the client before the backend's last retry returns,
        # which is what the per-repo refresh button was hitting on large
        # repos that GitHub answers slowly.
        proxy_read_timeout 60s;
    }
}
