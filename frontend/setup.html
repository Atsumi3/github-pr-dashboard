<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub PR Dashboard - Setup</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .setup-pat-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
      }
      .setup-pat-input {
        width: 100%;
        height: 44px;
        padding: 0 16px;
        border-radius: 8px;
        background: #2a2a2a;
        border: 1px solid #444;
        color: #e8e8e8;
        font-size: 14px;
        font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
        outline: none;
        transition: border-color 150ms;
      }
      .setup-pat-input:focus {
        border-color: #5c9fd4;
        box-shadow: 0 0 0 2px rgba(92, 159, 212, 0.25);
      }
      .setup-pat-input::placeholder {
        color: #666;
      }
      .btn-pat {
        width: 100%;
        height: 44px;
        background: #333;
        color: #e8e8e8;
        border: 1px solid #444;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 150ms;
      }
      .btn-pat:hover {
        background: #444;
      }
      .btn-pat:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .setup-pat-hint {
        font-size: 12px;
        color: #888;
        line-height: 1.55;
        text-align: center;
        margin-top: 4px;
      }
      .setup-pat-hint a {
        color: #b6e3d9;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .setup-pat-hint a:hover {
        color: #d8f1ea;
      }
      .setup-pat-hint code {
        font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
        font-size: 11px;
        padding: 1px 4px;
        background: #2a2a2a;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="setup-page">
      <div class="setup-card">
        <div class="setup-logo">
          <svg viewBox="0 0 16 16" fill="currentColor" style="color: #1c1c1c">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
        </div>
        <h1 class="setup-title">GitHub PR Dashboard</h1>
        <p class="setup-desc">PR の監視を始めましょう</p>

        <div class="setup-pat-form">
          <input
            id="pat-input"
            class="setup-pat-input"
            type="password"
            placeholder="ghp_xxxx..."
            autocomplete="off"
          />
          <button id="btn-pat" class="btn-pat">接続</button>
          <p class="setup-pat-hint">
            Token をお持ちでなければ
            <a
              href="https://github.com/settings/tokens/new?scopes=repo&description=GitHub+PR+Dashboard"
              target="_blank"
              rel="noopener noreferrer"
              >GitHub でここから作成</a
            >
            できます (<code>repo</code> スコープ)。
          </p>
        </div>

        <p id="login-error" class="setup-error hidden"></p>
      </div>
    </div>
    <div id="toast-container"></div>
    <script type="module" src="/js/sw-register.js"></script>
    <script type="module">
      import { api, getStoredToken, setStoredToken, clearStoredToken } from '/js/api.js';

      // Already authenticated? Verify token still works against GitHub.
      if (getStoredToken()) {
        try {
          await api.authMe();
          window.location.href = '/';
        } catch {
          // Stored token is invalid/expired — clear and stay on this page.
          clearStoredToken();
        }
      }

      // PAT login
      const btnPat = document.getElementById('btn-pat');
      const patInput = document.getElementById('pat-input');

      btnPat.addEventListener('click', async () => {
        const errEl = document.getElementById('login-error');
        errEl.classList.add('hidden');
        const pat = patInput.value.trim();
        if (!pat) {
          errEl.textContent = 'Token を入力してください';
          errEl.classList.remove('hidden');
          return;
        }

        btnPat.disabled = true;
        btnPat.textContent = 'Connecting...';

        try {
          // Store first so api.authMe() picks it up via the X-GitHub-Token header.
          setStoredToken(pat);
          await api.authMe();
          window.location.href = '/';
        } catch (err) {
          clearStoredToken();
          errEl.textContent = err.message || 'Token verification failed';
          errEl.classList.remove('hidden');
          btnPat.disabled = false;
          btnPat.textContent = 'Token で接続';
        }
      });

      patInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') btnPat.click();
      });
    </script>
  </body>
</html>
